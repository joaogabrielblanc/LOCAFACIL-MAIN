<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — LocaFácil</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">

<div class="login-card">
  <div class="login-logo">
    <i class="fas fa-recycle"></i>
    <span>LocaFácil</span>
  </div>
  <div class="login-badge"><i class="fas fa-shield-alt"></i> Painel Administrativo</div>

  <div class="error-box" id="errBox" style="display:none;"></div>

  <div class="field" id="f-email">
    <label><i class="fas fa-envelope"></i> E-mail</label>
    <input type="email" id="email" placeholder="admin@locafacil.com" autocomplete="email" inputmode="email">
    <div class="field-hint"></div>
  </div>
  <div class="field" id="f-senha">
    <label><i class="fas fa-lock"></i> Senha</label>
    <div class="pwd-wrap">
      <input type="password" id="senha" placeholder="Digite sua senha" autocomplete="current-password">
      <button type="button" class="toggle-senha" onclick="toggleSenha(this)" tabindex="-1" aria-label="Mostrar senha"><i class="fas fa-eye"></i></button>
    </div>
    <div class="field-hint"></div>
  </div>

  <button class="btn-login" id="btnLogin" onclick="fazerLogin()">
    <i class="fas fa-sign-in-alt"></i> Acessar Painel
  </button>

  <a href="../../index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Voltar ao site
  </a>
</div>

<script src="../../lib/db.js"></script>
<script src="../../assets/js/validacao.js"></script>
<script src="admin-api.js"></script>
<script>
  // Redirecionar se já logado como admin
  const s = AdminAPI.getSession();
  if (s && s.tipo === 'admin') location.href = 'dashboard.html';

  const elEmail = document.getElementById('email');
  const elSenha = document.getElementById('senha');

  function vEmail() {
    const field = document.getElementById('f-email');
    const v = elEmail.value.trim();
    if (!v) { setEstado(field, 'neutro'); return false; }
    if (Validador.email(v)) { setEstado(field, 'valido', 'E-mail válido'); return true; }
    setEstado(field, 'invalido', 'Digite um e-mail válido');
    return false;
  }
  function vSenha() {
    const field = document.getElementById('f-senha');
    if (!elSenha.value) { setEstado(field, 'neutro'); return false; }
    setEstado(field, 'valido');
    return true;
  }

  elEmail.addEventListener('input', vEmail);
  elEmail.addEventListener('blur',  vEmail);
  elSenha.addEventListener('input', vSenha);

  async function fazerLogin() {
    const email = elEmail.value.trim();
    const senha = elSenha.value;
    const err   = document.getElementById('errBox');
    const btn   = document.getElementById('btnLogin');

    err.style.display = 'none';
    if (!email || !senha) { err.textContent = 'Preencha e-mail e senha.'; err.style.display = 'flex'; return; }
    if (!vEmail()) { err.textContent = 'Verifique o e-mail informado.'; err.style.display = 'flex'; return; }

    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
    btn.disabled  = true;

    const r = await AdminAPI.login(email, senha);
    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acessar Painel';
    btn.disabled  = false;

    if (r.sucesso) { location.href = 'dashboard.html'; }
    else { err.textContent = r.erro || 'Credenciais inválidas.'; err.style.display = 'flex'; }
  }

  elSenha.addEventListener('keydown', e => e.key === 'Enter' && fazerLogin());
</script>
</body>
</html>
